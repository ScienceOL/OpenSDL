[package]
name = "osdl-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "CLI for OpenSDL — standalone lab hardware bridge"

[[bin]]
name = "osdl"
path = "src/main.rs"

[[example]]
name = "espnow_probe"
path = "examples/espnow_probe.rs"
required-features = ["osdl-core/espnow"]

[[example]]
name = "runze_via_espnow"
path = "examples/runze_via_espnow.rs"
required-features = ["osdl-core/espnow"]

[dev-dependencies]
serde_json.workspace = true

[dependencies]
osdl-core = { path = "../osdl-core" }
tokio.workspace = true
log.workspace = true
env_logger = "0.11"
