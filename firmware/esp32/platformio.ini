; PlatformIO configuration for OpenSDL child node firmware.
;
; Build & flash:
;   pio run -t upload
;   pio device monitor   (serial debug console)
;
; Before flashing, copy config.example.h to config.h and fill in
; your WiFi credentials, broker IP, node ID, and hardware ID.

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

; For ESP32 (non-S3), use this instead:
; [env:esp32]
; platform = espressif32
; board = esp32dev
; framework = arduino
; monitor_speed = 115200
; lib_deps =
;     knolleary/PubSubClient@^2.8
