# LaiYu XYZ station — bus manifest.
#
# One ESP-NOW node (LilyGO T-CAN485, MAC A4:F0:0F:D8:55:5C) fronts a shared
# RS-485 bus at 115200 8N1 carrying 4 addressable devices:
#   - 3 LaiYu XYZ stepper motors (Modbus RTU, slave_ids 1/2/3 = X/Y/Z axes)
#   - 1 SOPA YYQ pneumatic pipette (ASCII protocol, address 4)
#
# The node firmware (`firmware/esp32/src/bin/node-tcan485.rs`) ships a
# MAC-only `REG`. `mac_assignments` below tells the mother that this MAC
# means `bus.laiyu_xyz.station1`, which then matches the bus manifest and
# fans out to 4 logical devices.
#
# Use with:
#   osdl serve --config docs/recipes/configs/laiyu-xyz-station.yaml \
#              --registry $(pwd)/registry/unilabos \
#              --dongle-port /dev/cu.usbmodem1101

mqtt: ~  # No MQTT bridge needed — ESP-NOW only.

adapters:
  - type: unilabos
    registry_path: registry/unilabos

mac_assignments:
  A4F00FD8555C: bus.laiyu_xyz.station1

buses:
  - match_hardware_id: bus.laiyu_xyz.station1
    devices:
      - local_id: axis-x
        device_type: stepper_motor.laiyu_xyz.X
        role: stepper_motor
      - local_id: axis-y
        device_type: stepper_motor.laiyu_xyz.Y
        role: stepper_motor
      - local_id: axis-z
        device_type: stepper_motor.laiyu_xyz.Z
        role: stepper_motor
      - local_id: pipette
        device_type: pipette.sopa.YYQ
        role: pipette
